name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 部署 Worker
      - name: Deploy Worker
        run: cd worker && npm install && npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 部署 Pages
      - name: Build Frontend
        run: cd frontend && npm install && npm run build
        env:
          VITE_API_BASE: https://stashtab-worker.794733453.workers.dev/api

      - name: Deploy Pages
        run: cd frontend && npx wrangler pages deploy dist --project-name=stashtab
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
